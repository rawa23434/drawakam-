<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چوونەژوورەوە - پلاتفۆرمی گەرانی دراو</title>
    <!-- Google Fonts & FontAwesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Vazirmatn:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #131722 0%, #08090f 100%);
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.6);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 3rem;
            color: #2962ff;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(41, 98, 255, 0.4);
        }

        .login-header h2 {
            margin: 0;
            color: var(--text-main);
            font-size: 1.5rem;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
            position: relative;
        }

        .input-group label {
            display: block;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-input);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #2962ff;
            box-shadow: 0 0 10px rgba(41, 98, 255, 0.25);
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 42px;
            color: var(--text-muted);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #2962ff 0%, #1952e5 100%);
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(41, 98, 255, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(41, 98, 255, 0.6);
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        #error-msg {
            color: #ff5252;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.2);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-shield-alt"></i>
            <h2>بەخێربێیت</h2>
            <p>تکایە زانیارییەکانت بنووسە بۆ چوونەژوورەوە</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">ناوی بەکارهێنەر</label>
                <input type="text" id="username" placeholder="ناوی بەکارهێنەر..." required dir="ltr">
                <i class="fas fa-user"></i>
            </div>

            <div class="input-group">
                <label for="password">تێپەڕوشە (پاسوۆرد)</label>
                <input type="password" id="password" placeholder="پاسوۆرد..." required dir="ltr">
                <i class="fas fa-lock"></i>
            </div>

            <button type="submit" class="login-btn" id="submitBtn">
                چوونەژوورەوە <i class="fas fa-sign-in-alt"></i>
            </button>

            <div id="error-msg">یوزەرنەیم یان پاسوۆرد هەڵەیە!</div>
        </form>
    </div>

    <!-- Security Protections for Login Page -->
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode === 123 ||
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 67 || e.keyCode === 74)) ||
                (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    submitBtn.innerHTML = 'سەرکەوتوو بوو <i class="fas fa-check"></i>';
                    submitBtn.style.background = '#00c853';
                    submitBtn.style.boxShadow = '0 4px 15px rgba(0, 200, 83, 0.4)';
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 500);
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = data.message || 'یوزەرنەیم یان پاسوۆرد هەڵەیە!';
                    submitBtn.innerHTML = 'چوونەژوورەوە <i class="fas fa-sign-in-alt"></i>';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'هەڵەیەک ڕوویدا لە پەیوەندیکردن بە سێرڤەر';
                submitBtn.innerHTML = 'چوونەژوورەوە <i class="fas fa-sign-in-alt"></i>';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
